# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'


set -g set-clipboard on
set -s copy-command ''

# Initialize TMUX plugin manager
# macOS: use Homebrew's tpm if present; otherwise (Linux) use ~/.tmux/plugins/tpm,
# cloning it on first launch if missing.
run 'p="$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm"; [ -x "$p" ] || { p="$HOME/.tmux/plugins/tpm/tpm"; [ -x "$p" ] || git clone --depth 1 https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm"; }; "$p"'

# Set base index AFTER plugins load
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -sg escape-time 0

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g focus-events on

# --- Web app dev quality-of-life ---

# Mouse: scroll dev-server logs, click/resize panes
set -g mouse on

# Big scrollback for build output and server logs
set -g history-limit 100000

# Truecolor so vite/next/tailwind output and TUIs render properly
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Keep window numbers gapless when one closes
set -g renumber-windows on

# vi-style copy mode (v to select, y to yank)
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# New windows/splits open in the current pane's directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Repeatable pane resizing (prefix + H/J/K/L, hold to keep resizing)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Highlight windows with activity (e.g. a dev server erroring in the background)
setw -g monitor-activity on
set -g visual-activity off

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
